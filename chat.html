<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot Mastra</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #4f46e5;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header select {
      margin-left: auto;
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      background: rgba(255,255,255,0.15);
      color: white;
      cursor: pointer;
    }

    header select option { color: #111; background: white; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      align-self: flex-start;
      background: white;
      color: #111;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing {
      align-self: flex-start;
      background: white;
      padding: 12px 18px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      color: #888;
      font-style: italic;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    form {
      display: flex;
      gap: 8px;
      padding: 16px;
      background: white;
      border-top: 1px solid #e5e7eb;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #d1d5db;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f46e5; }

    button {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <span style="font-size:22px">🤖</span>
  <strong>Mastra Chatbot</strong>
  <select id="agentSelect">
    <option value="research-agent">🔍 Research Agent</option>
    <option value="weather-agent">🌤️ Weather Agent</option>
  </select>
</header>

<div id="messages"></div>

<form id="chatForm">
  <input id="input" type="text" placeholder="พิมพ์ข้อความ..." autocomplete="off" required />
  <button id="sendBtn" type="submit">ส่ง</button>
</form>

<script>
  const API_BASE = 'http://localhost:4112/api';
  const messagesEl = document.getElementById('messages');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const agentSelect = document.getElementById('agentSelect');

  let threadId = crypto.randomUUID();

  function addBubble(role, text) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'typing';
    div.textContent = 'กำลังคิด...';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  agentSelect.addEventListener('change', () => {
    threadId = crypto.randomUUID();
    messagesEl.innerHTML = '';
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    sendBtn.disabled = true;
    addBubble('user', text);

    const typing = addTyping();

    try {
      const agentId = agentSelect.value;
      const res = await fetch(`${API_BASE}/agents/${agentId}/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'user', content: text }],
          threadId,
          resourceId: 'chat-user',
        }),
      });

      typing.remove();

      if (!res.ok) {
        const err = await res.text();
        addBubble('assistant', `❌ Error: ${err}`);
        return;
      }

      const bubble = addBubble('assistant', '');
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        // Parse SSE / AI SDK stream format
        for (const line of chunk.split('\n')) {
          if (line.startsWith('0:')) {
            try {
              const part = JSON.parse(line.slice(2));
              full += part;
              bubble.textContent = full;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } catch {}
          }
        }
      }

      if (!full) bubble.textContent = '(ไม่มีคำตอบ)';

    } catch (err) {
      typing.remove();
      addBubble('assistant', `❌ ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
